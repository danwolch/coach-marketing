<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0;url=workcoach://home">
<title>Opening Work Coach...</title>
<link rel="icon" href="../img/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ebe5da;
    --muted: #6b7a6e;
    --text: #1a2e22;
    --card: #fffdf8;
    --border: #d6d0c4;
    --accent: #31c178;
    --accent-2: #1e6b42;
    --shadow: 0 10px 30px rgba(0,0,0,.07);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Source Sans 3', ui-sans-serif, system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    text-align: center;
    padding: 2rem;
    max-width: 420px;
  }
  .icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent);
    display: grid;
    place-items: center;
    margin: 0 auto 1.5rem;
    box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent);
    animation: pulse 2.5s ease-in-out infinite;
  }
  .icon::after {
    content: "";
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--bg);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem;
    font-weight: 400;
    margin-bottom: 0.75rem;
    color: var(--text);
  }
  p {
    color: var(--muted);
    margin-bottom: 2rem;
    line-height: 1.6;
    font-size: 16px;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #ffffff;
    padding: 14px 28px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    font-family: 'Source Sans 3', sans-serif;
    transition: transform 0.05s ease, background 0.2s ease;
  }
  .btn-primary:hover {
    background: color-mix(in oklab, var(--accent) 85%, white);
  }
  .btn-primary:active {
    transform: translateY(1px);
  }
  .btn-primary:focus {
    outline: 2px solid color-mix(in oklab, var(--accent) 60%, white);
    outline-offset: 2px;
  }
  .apple-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }
  .manual-link {
    display: inline-block;
    margin-top: 12px;
    color: var(--muted);
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
    transition: color 0.2s;
  }
  .manual-link:hover { color: var(--text); }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="container">
    <div class="icon" aria-hidden="true"></div>

    <div id="opening">
      <h1>Opening Work Coach...</h1>
      <p>You should see the app open momentarily.</p>
    </div>

    <div id="fallback" class="hidden">
      <h1>Couldn't open Work Coach</h1>
      <p>The app may not be installed, or it didn't respond to the link.</p>
      <a href="https://work.coach/" class="btn-primary">
        <svg class="apple-icon" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M20.0035 7.15814C19.3171 7.5784 18.7485 8.16594 18.351 8.86579C17.9534 9.56563 17.74 10.3549 17.7305 11.1597C17.7332 12.0655 18.0016 12.9506 18.5024 13.7054C19.0032 14.4602 19.7144 15.0515 20.5479 15.4061C20.2193 16.4664 19.7329 17.4712 19.1051 18.3868C18.2069 19.6798 17.2677 20.9727 15.8387 20.9727C14.4096 20.9727 14.0421 20.1425 12.3952 20.1425C10.7892 20.1425 10.2175 21 8.91088 21C7.60426 21 6.69246 19.8022 5.6444 18.3323C4.25999 16.2732 3.49913 13.8583 3.45312 11.3774C3.45312 7.29427 6.10722 5.13028 8.72032 5.13028C10.1086 5.13028 11.2656 6.04208 12.1366 6.04208C12.9669 6.04208 14.2599 5.07572 15.8387 5.07572C16.6504 5.05478 17.4548 5.23375 18.1811 5.59689C18.9074 5.96003 19.5332 6.49619 20.0035 7.15814ZM15.0901 3.34726C15.7861 2.52858 16.18 1.49589 16.2062 0.421702C16.2074 0.280092 16.1937 0.13875 16.1654 0C14.9699 0.116777 13.8644 0.686551 13.0757 1.59245C12.3731 2.37851 11.9643 3.38362 11.9188 4.43697C11.9193 4.56507 11.933 4.69278 11.9597 4.81808C12.0539 4.8359 12.1496 4.84503 12.2455 4.84536C12.7964 4.80152 13.3327 4.64611 13.8217 4.38858C14.3108 4.13104 14.7423 3.77676 15.0901 3.34726Z" fill="currentColor"></path></svg>
        Download for Mac
      </a>
      <br>
      <a id="manual-open" class="manual-link hidden">Try opening again</a>
    </div>
  </div>

  <script>
    (function () {
      window.location.href = 'workcoach://home';

      setTimeout(function () {
        document.getElementById('opening').classList.add('hidden');
        var fb = document.getElementById('fallback');
        fb.classList.remove('hidden');
        var manual = document.getElementById('manual-open');
        manual.classList.remove('hidden');
        manual.addEventListener('click', function (e) {
          e.preventDefault();
          window.location.href = 'workcoach://home';
        });
      }, 3000);
    })();
  </script>
</body>
</html>
