<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Open in Coach</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #ebe5da;
      --muted: #6b7a6e;
      --text: #1a2e22;
      --card: #fffdf8;
      --border: #d6d0c4;
      --accent: #31c178;
      --accent-2: #1e6b42;
      --shadow: 0 10px 30px rgba(0,0,0,.07);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent);
      display: grid;
      place-items: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent);
      animation: pulse 2s infinite;
    }
    .icon::after {
      content: "";
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg);
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent); }
      70% { box-shadow: 0 0 0 16px rgba(0,0,0,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--text);
    }
    p {
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      padding: 0.875rem 2rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.05s ease, background 0.2s ease;
    }
    .button:hover {
      background: color-mix(in oklab, var(--accent) 85%, white);
    }
    .button:active {
      transform: translateY(1px);
    }
    .button:focus {
      outline: 2px solid color-mix(in oklab, var(--accent) 60%, white);
      outline-offset: 2px;
    }
    .manual-link {
      display: inline-block;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: underline;
      cursor: pointer;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" aria-hidden="true"></div>

    <!-- Deep link redirect state (macapp paths) -->
    <div id="opening" class="hidden">
      <h1>Opening Work Coach...</h1>
      <p>You should see the app open momentarily.</p>
    </div>

    <!-- Fallback after redirect timeout or non-macapp 404 -->
    <div id="fallback">
      <h1>Open in Coach</h1>
      <p>This link is meant to open in the Coach app. Download it to continue.</p>
      <a href="https://work.coach/" class="button">Download for Mac</a>
      <br>
      <a id="manual-open" class="manual-link hidden">Try opening again</a>
    </div>
  </div>

  <script>
    (function () {
      var path = window.location.pathname;

      // Handle /macapp/ deep links -> workcoach:// redirect
      if (path.match(/^\/macapp(\/|$)/)) {
        var route = path.replace(/^\/macapp\/?/, '') || 'home';
        var search = window.location.search || '';
        var deepLink = 'workcoach://' + route + search;

        // Show the "opening" state
        document.getElementById('opening').classList.remove('hidden');
        document.getElementById('fallback').classList.add('hidden');

        // Attempt redirect
        window.location.href = deepLink;

        // After 3s, show fallback if still on this page
        setTimeout(function () {
          document.getElementById('opening').classList.add('hidden');
          var fb = document.getElementById('fallback');
          fb.classList.remove('hidden');
          fb.querySelector('h1').textContent = "Couldn't open Work Coach";
          fb.querySelector('p').textContent = 'The app may not be installed, or it didn\'t respond to the link.';
          var manual = document.getElementById('manual-open');
          manual.classList.remove('hidden');
          manual.addEventListener('click', function (e) {
            e.preventDefault();
            window.location.href = deepLink;
          });
        }, 3000);
      }
    })();
  </script>
</body>
</html>
